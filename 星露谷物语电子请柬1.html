<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stardew Wedding 💍</title>
description: Bookmark this to keep an eye on my project updates!
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Press Start 2P', monospace;
  background: #e7f5dc url("https://i.imgur.com/9zVZzKd.png"); /* 草地 */
  background-size: cover;
  color: #3c2f2f;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.card {
  background: #fff8e1;
  border: 6px solid #6b4f3b;
  box-shadow: 8px 8px 0 #a1887f;
  padding: 24px;
  max-width: 420px;
  text-align: center;
}

h1 {
  font-size: 14px;
  color: #e57373;
  margin-bottom: 12px;
}

.names {
  font-size: 12px;
  margin: 12px 0;
}

.pixel-box {
  border: 4px solid #6b4f3b;
  padding: 12px;
  margin: 16px 0;
  background: #fffde7;
  font-size: 10px;
  line-height: 1.8;
}

.btn {
  display: inline-block;
  margin-top: 16px;
  padding: 12px 18px;
  background: #81c784;
  border: 4px solid #388e3c;
  color: white;
  text-decoration: none;
  font-size: 10px;
  cursor: pointer;
}

.btn:hover {
  background: #66bb6a;
}

footer {
  margin-top: 16px;
  font-size: 8px;
  color: #795548;
}
</style>
</head>

<body>

<div class="card">
  <h1>💌 婚礼邀请函</h1>

  <div class="pixel-box">
    亲爱的农场邻居：<br><br>
    春天播种，夏天耕耘，<br>
    秋天收获，冬天相守。<br><br>
    现在，我们要结婚啦 💍
  </div>

  <div class="names">
    🌻 李标鹏 ❤ 冼少娟 🥕
  </div>

  <div class="pixel-box">
    📅 时间：秋 12 日<br>
    ⏰ 钟楼敲响 12 下<br>
    📍 地点：鹈鹕镇社区中心
  </div>

  <a class="btn" href=" ">确认出席 🎁</a >

  <footer>
    * 记得带上你的奶牛和狗狗 *
  </footer>
</div>

</body>
</html>
